version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crypto_tracker_db
    environment:
      POSTGRES_USER: ${DB_USER:-crypto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crypto_password}
      POSTGRES_DB: ${DB_NAME:-crypto_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crypto_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto_tracker_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-crypto_user}:${DB_PASSWORD:-crypto_password}@postgres:5432/${DB_NAME:-crypto_tracker}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-this-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      SECRET_KEY_PASSLIB: ${SECRET_KEY_PASSLIB:-your-passlib-secret-key}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}
      DEBUG: ${DEBUG:-False}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    # wrapper ensures entrypoint script is executable when host volume overrides image
    entrypoint: ["/bin/sh","-c","chmod +x /app/entrypoint.sh && /app/entrypoint.sh"]
    command: python main.py
    networks:
      - crypto_network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto_tracker_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - crypto_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  crypto_network:
    driver: bridge
